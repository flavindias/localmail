<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalMail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:             oklch(0.10 0.013 248);
  --surface:        oklch(0.14 0.011 248);
  --surface-2:      oklch(0.175 0.010 248);
  --surface-hover:  oklch(0.195 0.009 248);
  --border:         oklch(0.21 0.008 248);
  --border-2:       oklch(0.27 0.007 248);

  --text:           oklch(0.93 0.008 248);
  --text-2:         oklch(0.70 0.010 248);
  --text-3:         oklch(0.48 0.008 248);

  --accent:         oklch(0.76 0.14 82);
  --accent-dim:     oklch(0.66 0.16 82);
  --accent-faint:   oklch(0.76 0.14 82 / 0.10);
  --accent-faint-2: oklch(0.76 0.14 82 / 0.18);

  --danger:         oklch(0.60 0.20 20);
  --success:        oklch(0.65 0.15 145);

  --font-ui:      'Figtree', system-ui, sans-serif;
  --font-display: 'Josefin Sans', system-ui, sans-serif;

  --r-sm: 4px;
  --r:    6px;
  --r-lg: 10px;
}

html, body { height: 100%; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}


/* ─── Header ─────────────────────────────────────────────────── */

header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
}

.wordmark {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
}

.smtp-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--text-3);
  padding: 3px 8px;
  background: var(--bg);
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  font-family: 'Menlo', 'Monaco', monospace;
}

.smtp-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 6px oklch(0.65 0.15 145 / 0.55);
  flex-shrink: 0;
}

.header-spacer { flex: 1; }

.msg-count {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.01em;
}

.header-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border: 1px solid var(--border-2);
  border-radius: var(--r);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  letter-spacing: 0.01em;
}
.header-btn:hover {
  color: var(--danger);
  border-color: var(--danger);
  background: oklch(0.60 0.20 20 / 0.08);
}


/* ─── Layout ─────────────────────────────────────────────────── */

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}


/* ─── Sidebar ────────────────────────────────────────────────── */

.sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}

.sidebar-top {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 9px;
  pointer-events: none;
  color: var(--text-3);
  display: flex;
  align-items: center;
  line-height: 0;
}

#search {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--border-2); }
#search::placeholder { color: var(--text-3); }


/* ─── Email list ─────────────────────────────────────────────── */

.email-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.email-list::-webkit-scrollbar { width: 4px; }
.email-list::-webkit-scrollbar-track { background: transparent; }
.email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


/* ─── Email items ────────────────────────────────────────────── */

.email-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}

.email-item:hover        { background: var(--surface-hover); }
.email-item.active       { background: var(--accent-faint); }

/* Reserve space for unread dot — always present, visible when unread */
.item-row-1 {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}

.item-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
.email-item.unread .item-dot { background: var(--accent); }

.item-from {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.1s;
}
.email-item.unread .item-from  { font-weight: 600; }
.email-item.active .item-from  { color: var(--accent); }

.item-time {
  font-size: 11px;
  color: var(--text-3);
  flex-shrink: 0;
}
.email-item.unread .item-time  { color: var(--accent); }

.item-subject {
  font-size: 12.5px;
  font-weight: 400;
  color: var(--text-2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 2px;
  padding-left: 11px;
}
.email-item.unread .item-subject { color: var(--text); font-weight: 500; }

.item-preview {
  font-size: 11.5px;
  color: var(--text-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 11px;
}


/* ─── Empty list ─────────────────────────────────────────────── */

.empty-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 52px 24px;
  color: var(--text-3);
  text-align: center;
}
.empty-list svg    { opacity: 0.25; margin-bottom: 10px; }
.empty-list-title  { font-size: 13px; font-weight: 500; color: var(--text-2); }
.empty-list-code   {
  font-family: 'Menlo', 'Monaco', monospace;
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-faint);
  padding: 3px 8px;
  border-radius: var(--r-sm);
  margin-top: 4px;
}


/* ─── Detail panel ───────────────────────────────────────────── */

.detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}


/* ─── Empty state ────────────────────────────────────────────── */

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.empty-state-icon  { opacity: 0.12; margin-bottom: 2px; }
.empty-state-title { font-size: 15px; font-weight: 500; color: var(--text-2); }
.empty-state-sub   { font-size: 12.5px; color: var(--text-3); text-align: center; line-height: 1.7; }
.smtp-code {
  font-family: 'Menlo', 'Monaco', monospace;
  font-size: 11.5px;
  color: var(--accent);
  background: var(--accent-faint);
  padding: 1px 6px;
  border-radius: var(--r-sm);
}


/* ─── Detail view ────────────────────────────────────────────── */

.detail-view {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

@media (prefers-reduced-motion: no-preference) {
  .detail-view { animation: slide-up 0.18s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
}

.detail-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.detail-subject {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 14px;
  max-width: 72ch;
}

.detail-meta {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 5px 8px;
  font-size: 12.5px;
  margin-bottom: 14px;
  align-items: baseline;
}

.meta-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-3);
  padding-top: 2px;
}

.meta-value {
  color: var(--text-2);
  word-break: break-word;
  line-height: 1.5;
}

.detail-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.action-btn:hover { background: var(--surface-hover); color: var(--text); }
.action-btn.danger:hover {
  color: var(--danger);
  border-color: oklch(0.60 0.20 20 / 0.6);
  background: oklch(0.60 0.20 20 / 0.08);
}


/* ─── Tabs ───────────────────────────────────────────────────── */

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0 20px;
}

.tab {
  padding: 9px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  letter-spacing: 0.02em;
}
.tab:hover    { color: var(--text-2); }
.tab.active   { color: var(--accent); border-bottom-color: var(--accent); }


/* ─── Tab content ────────────────────────────────────────────── */

.tab-content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.tab-pane              { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-pane.active       { display: flex; }

#html-frame {
  flex: 1;
  border: none;
  background: #fff;
}

.code-pane {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#text-content   { font-size: 13px; color: var(--text-2); }
#source-content { font-size: 11px; color: var(--text-3); }


/* ─── Back button (mobile) ───────────────────────────────────── */

.back-btn {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 10px 16px 0;
  background: transparent;
  border: none;
  color: var(--accent);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
}


/* ─── Toast ──────────────────────────────────────────────────── */

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  color: var(--text);
  padding: 9px 14px 9px 12px;
  border-radius: var(--r);
  font-size: 12.5px;
  font-weight: 500;
  box-shadow: 0 8px 24px oklch(0 0 0 / 0.5);
  transform: translateY(10px);
  opacity: 0;
  transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s;
  z-index: 100;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

#toast.show { transform: translateY(0); opacity: 1; }


/* ─── Responsive ─────────────────────────────────────────────── */

@media (max-width: 680px) {
  .sidebar     { width: 100%; }
  .smtp-status { display: none; }
  .layout      { position: relative; }

  .detail {
    position: absolute;
    inset: 0;
    background: var(--bg);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 10;
  }

  .detail.open { transform: translateX(0); }
  .back-btn    { display: flex; }
}

</style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────── -->
<header>
  <span class="wordmark">LocalMail</span>
  <div class="smtp-status">
    <span class="smtp-dot"></span>
    :1025
  </div>
  <div class="header-spacer"></div>
  <span class="msg-count" id="count-badge">No messages</span>
  <button class="header-btn" id="clear-all-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="3 6 5 6 21 6"/>
      <path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/>
    </svg>
    Clear all
  </button>
</header>

<!-- ─── Layout ──────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input id="search" type="text" placeholder="Filter messages…" autocomplete="off" spellcheck="false" aria-label="Filter messages" />
      </div>
    </div>

    <div class="email-list" id="email-list" role="list">
      <div class="empty-list" id="empty-list">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <p class="empty-list-title">No messages yet</p>
        <code class="empty-list-code">smtp://localhost:1025</code>
      </div>
    </div>
  </aside>

  <!-- Detail -->
  <main class="detail" id="detail-panel" aria-label="Email detail">

    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <p class="empty-state-title">Select a message to read it</p>
      <p class="empty-state-sub">
        Send to <span class="smtp-code">smtp://localhost:1025</span><br>
        and messages appear here in real time.
      </p>
    </div>

    <div class="detail-view" id="detail-view" style="display:none">

      <button class="back-btn" id="back-btn" aria-label="Back to inbox">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        Inbox
      </button>

      <div class="detail-header">
        <p class="detail-subject" id="detail-subject"></p>
        <dl class="detail-meta" id="detail-meta"></dl>
        <div class="detail-actions">
          <button class="action-btn" id="view-source-btn" title="View raw source">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            Source
          </button>
          <button class="action-btn danger" id="delete-btn" title="Delete this message">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/>
            </svg>
            Delete
          </button>
        </div>
      </div>

      <div class="tabs" role="tablist">
        <div class="tab active" data-tab="html"    role="tab" tabindex="0">HTML</div>
        <div class="tab"        data-tab="text"    role="tab" tabindex="0">Plain text</div>
        <div class="tab"        data-tab="source"  role="tab" tabindex="0">Raw source</div>
      </div>

      <div class="tab-content">
        <div class="tab-pane active" id="pane-html" role="tabpanel">
          <iframe id="html-frame" sandbox="allow-same-origin" title="Email HTML content"></iframe>
        </div>
        <div class="tab-pane" id="pane-text" role="tabpanel">
          <pre id="text-content" class="code-pane"></pre>
        </div>
        <div class="tab-pane" id="pane-source" role="tabpanel">
          <pre id="source-content" class="code-pane"></pre>
        </div>
      </div>

    </div>
  </main>

</div>

<div id="toast" role="status" aria-live="polite">
  <span class="toast-dot" aria-hidden="true"></span>
  <span id="toast-msg">New email received</span>
</div>

<script>

// ─── State ─────────────────────────────────────────────────────
let emails = [];
let selectedId = null;
const readIds = new Set();

// ─── Utilities ─────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function fmtTimeFull(iso) {
  return new Date(iso).toLocaleString([], {
    weekday: 'short', year: 'numeric', month: 'short',
    day: 'numeric', hour: '2-digit', minute: '2-digit',
  });
}

// ─── Count ─────────────────────────────────────────────────────
function updateCount() {
  const n = emails.length;
  document.getElementById('count-badge').textContent =
    n === 0 ? 'No messages' : n === 1 ? '1 message' : `${n} messages`;
}

// ─── Render list ───────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('email-list');
  const emptyEl = document.getElementById('empty-list');

  const filtered = q
    ? emails.filter(e =>
        (e.from ?? '').toLowerCase().includes(q) ||
        (e.subject ?? '').toLowerCase().includes(q) ||
        (e.to ?? []).join(' ').toLowerCase().includes(q))
    : emails;

  if (!filtered.length) {
    list.innerHTML = '';
    list.appendChild(emptyEl);
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  list.innerHTML = filtered.map(e => {
    const unread = !readIds.has(e.id);
    const active = e.id === selectedId;
    return `
      <div class="email-item${active ? ' active' : ''}${unread ? ' unread' : ''}"
           data-id="${esc(e.id)}" role="listitem" tabindex="0"
           aria-selected="${active}">
        <div class="item-row-1">
          <span class="item-dot" aria-hidden="true"></span>
          <span class="item-from">${esc(e.from ?? '(no sender)')}</span>
          <span class="item-time">${fmtTime(e.date)}</span>
        </div>
        <div class="item-subject">${esc(e.subject ?? '(no subject)')}</div>
        <div class="item-preview">${esc((e.preview ?? '').slice(0, 120))}</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.email-item').forEach(el => {
    el.addEventListener('click', () => selectEmail(el.dataset.id));
    el.addEventListener('keydown', ev => {
      if (ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        selectEmail(el.dataset.id);
      }
    });
  });
}

// ─── Fetch list ────────────────────────────────────────────────
async function fetchEmails() {
  try {
    const res = await fetch('/api/messages');
    if (!res.ok) return;
    emails = await res.json();
    updateCount();
    renderList();
  } catch {}
}

// ─── Select email ──────────────────────────────────────────────
async function selectEmail(id) {
  selectedId = id;
  readIds.add(id);
  renderList();
  document.getElementById('detail-panel').classList.add('open');

  try {
    const res = await fetch(`/api/messages/${id}`);
    if (!res.ok) return;
    showDetail(await res.json());
  } catch {}
}

// ─── Show detail ───────────────────────────────────────────────
function showDetail(email) {
  document.getElementById('empty-state').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'flex';
  void dv.offsetWidth; // force reflow for animation replay

  document.getElementById('detail-subject').textContent =
    email.subject ?? '(no subject)';

  const rows = [
    ['From',     email.from ?? '—'],
    ['To',       (email.to ?? []).join(', ') || '—'],
    ['Received', fmtTimeFull(email.date)],
  ];
  if (email.attachments?.length) {
    rows.push(['Files', email.attachments
      .map(a => `${a.filename} (${(a.size / 1024).toFixed(1)} KB)`).join(', ')]);
  }
  document.getElementById('detail-meta').innerHTML = rows
    .map(([l, v]) =>
      `<dt class="meta-label">${esc(l)}</dt><dd class="meta-value">${esc(v)}</dd>`)
    .join('');

  const frame = document.getElementById('html-frame');
  frame.srcdoc = email.html
    ? email.html
    : `<pre style="font-family:system-ui;font-size:13px;padding:20px;white-space:pre-wrap;color:#333">${esc(email.text ?? '')}</pre>`;

  document.getElementById('text-content').textContent =
    email.text ?? '(no plain-text body)';
  document.getElementById('source-content').textContent =
    email.raw ?? '';

  activateTab('html');

  document.getElementById('delete-btn').onclick = async () => {
    await fetch(`/api/messages/${email.id}`, { method: 'DELETE' });
    emails = emails.filter(e => e.id !== email.id);
    readIds.delete(email.id);
    selectedId = null;
    updateCount();
    renderList();
    clearDetail();
  };

  document.getElementById('view-source-btn').onclick = () => activateTab('source');
}

// ─── Clear detail ──────────────────────────────────────────────
function clearDetail() {
  document.getElementById('empty-state').style.display = '';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('detail-panel').classList.remove('open');
}

// ─── Tabs ──────────────────────────────────────────────────────
function activateTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === `pane-${name}`));
}
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => activateTab(t.dataset.tab)));

// ─── Clear all ─────────────────────────────────────────────────
document.getElementById('clear-all-btn').addEventListener('click', async () => {
  if (!emails.length) return;
  await fetch('/api/messages', { method: 'DELETE' });
  emails = [];
  selectedId = null;
  readIds.clear();
  updateCount();
  renderList();
  clearDetail();
});

// ─── Search ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderList);

// ─── Back (mobile) ─────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  selectedId = null;
  clearDetail();
  renderList();
});

// ─── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  document.getElementById('toast-msg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ─── SSE ───────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = async ev => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'email:added') {
        await fetchEmails();
        showToast('New email received');
      }
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

// ─── Init ──────────────────────────────────────────────────────
fetchEmails();
connectSSE();

</script>
</body>
</html>
