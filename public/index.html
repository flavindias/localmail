<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalMail</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600&family=Figtree:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg:             oklch(0.10 0.013 248);
  --surface:        oklch(0.14 0.011 248);
  --surface-2:      oklch(0.175 0.010 248);
  --surface-hover:  oklch(0.195 0.009 248);
  --border:         oklch(0.21 0.008 248);
  --border-2:       oklch(0.27 0.007 248);

  --text:           oklch(0.93 0.008 248);
  --text-2:         oklch(0.70 0.010 248);
  --text-3:         oklch(0.48 0.008 248);

  --accent:         oklch(0.76 0.14 82);
  --accent-dim:     oklch(0.66 0.16 82);
  --accent-faint:   oklch(0.76 0.14 82 / 0.10);
  --accent-faint-2: oklch(0.76 0.14 82 / 0.18);

  --danger:         oklch(0.60 0.20 20);
  --success:        oklch(0.65 0.15 145);

  --font-ui:      'Figtree', system-ui, sans-serif;
  --font-display: 'Josefin Sans', system-ui, sans-serif;

  --r-sm: 4px;
  --r:    6px;
  --r-lg: 10px;
}

/* ─── Light theme ────────────────────────────────────────────── */

[data-theme="light"] {
  --bg:             oklch(0.96 0.005 248);
  --surface:        oklch(0.99 0.003 248);
  --surface-2:      oklch(0.94 0.006 248);
  --surface-hover:  oklch(0.91 0.007 248);
  --border:         oklch(0.87 0.008 248);
  --border-2:       oklch(0.78 0.010 248);

  --text:           oklch(0.20 0.015 248);
  --text-2:         oklch(0.38 0.012 248);
  --text-3:         oklch(0.58 0.010 248);

  --accent:         oklch(0.60 0.17 82);
  --accent-dim:     oklch(0.52 0.18 82);
  --accent-faint:   oklch(0.60 0.17 82 / 0.10);
  --accent-faint-2: oklch(0.60 0.17 82 / 0.18);

  --danger:         oklch(0.52 0.22 20);
  --success:        oklch(0.50 0.18 145);
}

html, body { height: 100%; }

body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}


/* ─── Header ─────────────────────────────────────────────────── */

header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
}

.wordmark {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text);
}

.smtp-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--text-3);
  padding: 3px 8px;
  background: var(--bg);
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  font-family: 'Menlo', 'Monaco', monospace;
}

.smtp-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 6px oklch(0.65 0.15 145 / 0.55);
  flex-shrink: 0;
}

.header-spacer { flex: 1; }

.msg-count {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.01em;
  white-space: nowrap;
}

/* ─── Theme toggle ───────────────────────────────────────────── */

.theme-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: var(--r);
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--surface-hover); color: var(--text); }

.theme-btn .icon-sun  { display: none; }
.theme-btn .icon-moon { display: block; }
[data-theme="light"] .theme-btn .icon-sun  { display: block; }
[data-theme="light"] .theme-btn .icon-moon { display: none; }

/* ─── Language switcher ──────────────────────────────────────── */

.lang-switcher {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
  flex-shrink: 0;
}

.lang-btn {
  padding: 4px 7px;
  background: var(--surface);
  border: none;
  color: var(--text-3);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
.lang-btn:hover  { background: var(--surface-hover); color: var(--text-2); }
.lang-btn.active { background: var(--accent-faint); color: var(--accent); }

/* ─── Header button ──────────────────────────────────────────── */

.header-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border: 1px solid var(--border-2);
  border-radius: var(--r);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
}
.header-btn:hover {
  color: var(--danger);
  border-color: var(--danger);
  background: oklch(0.60 0.20 20 / 0.08);
}


/* ─── Layout ─────────────────────────────────────────────────── */

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}


/* ─── Sidebar ────────────────────────────────────────────────── */

.sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}

.sidebar-top {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 9px;
  pointer-events: none;
  color: var(--text-3);
  display: flex;
  align-items: center;
  line-height: 0;
}

#search {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--border-2); }
#search::placeholder { color: var(--text-3); }


/* ─── Email list ─────────────────────────────────────────────── */

.email-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.email-list::-webkit-scrollbar { width: 4px; }
.email-list::-webkit-scrollbar-track { background: transparent; }
.email-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


/* ─── Email items ────────────────────────────────────────────── */

.email-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}

.email-item:hover  { background: var(--surface-hover); }
.email-item.active { background: var(--accent-faint); }

.item-row-1 {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}

.item-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
.email-item.unread .item-dot { background: var(--accent); }

.item-from {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.1s;
}
.email-item.unread .item-from { font-weight: 600; }
.email-item.active .item-from { color: var(--accent); }

.item-time {
  font-size: 11px;
  color: var(--text-3);
  flex-shrink: 0;
}
.email-item.unread .item-time { color: var(--accent); }

.item-subject {
  font-size: 12.5px;
  font-weight: 400;
  color: var(--text-2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 2px;
  padding-left: 11px;
}
.email-item.unread .item-subject { color: var(--text); font-weight: 500; }

.item-preview {
  font-size: 11.5px;
  color: var(--text-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 11px;
}


/* ─── Empty list ─────────────────────────────────────────────── */

.empty-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 52px 24px;
  color: var(--text-3);
  text-align: center;
}
.empty-list svg    { opacity: 0.25; margin-bottom: 10px; }
.empty-list-title  { font-size: 13px; font-weight: 500; color: var(--text-2); }
.empty-list-code   {
  font-family: 'Menlo', 'Monaco', monospace;
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-faint);
  padding: 3px 8px;
  border-radius: var(--r-sm);
  margin-top: 4px;
}


/* ─── Detail panel ───────────────────────────────────────────── */

.detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}


/* ─── Empty state ────────────────────────────────────────────── */

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.empty-state-icon  { opacity: 0.12; margin-bottom: 2px; }
.empty-state-title { font-size: 15px; font-weight: 500; color: var(--text-2); }
.empty-state-sub   { font-size: 12.5px; color: var(--text-3); text-align: center; line-height: 1.7; }
.smtp-code {
  font-family: 'Menlo', 'Monaco', monospace;
  font-size: 11.5px;
  color: var(--accent);
  background: var(--accent-faint);
  padding: 1px 6px;
  border-radius: var(--r-sm);
}


/* ─── Detail view ────────────────────────────────────────────── */

.detail-view {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

@media (prefers-reduced-motion: no-preference) {
  .detail-view { animation: slide-up 0.18s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
}

.detail-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.detail-subject {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 14px;
  max-width: 72ch;
}

.detail-meta {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 5px 8px;
  font-size: 12.5px;
  margin-bottom: 14px;
  align-items: baseline;
}

.meta-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-3);
  padding-top: 2px;
}

.meta-value {
  color: var(--text-2);
  word-break: break-word;
  line-height: 1.5;
}

.detail-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { background: var(--surface-hover); color: var(--text); }
.action-btn.danger:hover {
  color: var(--danger);
  border-color: oklch(0.60 0.20 20 / 0.6);
  background: oklch(0.60 0.20 20 / 0.08);
}


/* ─── Tabs ───────────────────────────────────────────────────── */

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0 20px;
}

.tab {
  padding: 9px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  user-select: none;
  letter-spacing: 0.02em;
}
.tab:hover  { color: var(--text-2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }


/* ─── Tab content ────────────────────────────────────────────── */

.tab-content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.tab-pane        { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-pane.active { display: flex; }

#html-frame {
  flex: 1;
  border: none;
  background: #fff;
}

.code-pane {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#text-content   { font-size: 13px; color: var(--text-2); }
#source-content { font-size: 11px; color: var(--text-3); }


/* ─── Back button (mobile) ───────────────────────────────────── */

.back-btn {
  display: none;
  align-items: center;
  gap: 5px;
  padding: 10px 16px 0;
  background: transparent;
  border: none;
  color: var(--accent);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
}


/* ─── Toast ──────────────────────────────────────────────────── */

#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  color: var(--text);
  padding: 9px 14px 9px 12px;
  border-radius: var(--r);
  font-size: 12.5px;
  font-weight: 500;
  box-shadow: 0 8px 24px oklch(0 0 0 / 0.5);
  transform: translateY(10px);
  opacity: 0;
  transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s;
  z-index: 100;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}

#toast.show { transform: translateY(0); opacity: 1; }


/* ─── Responsive ─────────────────────────────────────────────── */

@media (max-width: 680px) {
  .sidebar     { width: 100%; }
  .smtp-status { display: none; }
  .layout      { position: relative; }

  .detail {
    position: absolute;
    inset: 0;
    background: var(--bg);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 10;
  }

  .detail.open { transform: translateX(0); }
  .back-btn    { display: flex; }
}

</style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────── -->
<header>
  <span class="wordmark">LocalMail</span>
  <div class="smtp-status">
    <span class="smtp-dot"></span>
    :1025
  </div>
  <div class="header-spacer"></div>
  <span class="msg-count" id="count-badge"></span>

  <button class="theme-btn" id="theme-btn" aria-label="Toggle theme">
    <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </svg>
    <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>

  <div class="lang-switcher" role="group" aria-label="Language">
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="pt">PT</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="fr">FR</button>
  </div>

  <button class="header-btn" id="clear-all-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="3 6 5 6 21 6"/>
      <path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/>
    </svg>
    <span data-i18n="clear_all"></span>
  </button>
</header>

<!-- ─── Layout ──────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input id="search" type="text" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="email-list" id="email-list" role="list">
      <div class="empty-list" id="empty-list">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <p class="empty-list-title" data-i18n="empty_list_title"></p>
        <code class="empty-list-code">smtp://localhost:1025</code>
      </div>
    </div>
  </aside>

  <!-- Detail -->
  <main class="detail" id="detail-panel">

    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <p class="empty-state-title" data-i18n="empty_state_title"></p>
      <p class="empty-state-sub" id="empty-state-sub"></p>
    </div>

    <div class="detail-view" id="detail-view" style="display:none">

      <button class="back-btn" id="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m15 18-6-6 6-6"/>
        </svg>
        <span data-i18n="inbox"></span>
      </button>

      <div class="detail-header">
        <p class="detail-subject" id="detail-subject"></p>
        <dl class="detail-meta" id="detail-meta"></dl>
        <div class="detail-actions">
          <button class="action-btn" id="view-source-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            <span data-i18n="source"></span>
          </button>
          <button class="action-btn danger" id="delete-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6m5 0V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/>
            </svg>
            <span data-i18n="delete"></span>
          </button>
        </div>
      </div>

      <div class="tabs" role="tablist">
        <div class="tab active" data-tab="html"   role="tab" tabindex="0"><span data-i18n="tab_html"></span></div>
        <div class="tab"        data-tab="text"   role="tab" tabindex="0"><span data-i18n="tab_text"></span></div>
        <div class="tab"        data-tab="source" role="tab" tabindex="0"><span data-i18n="tab_source"></span></div>
      </div>

      <div class="tab-content">
        <div class="tab-pane active" id="pane-html" role="tabpanel">
          <iframe id="html-frame" sandbox="allow-same-origin"></iframe>
        </div>
        <div class="tab-pane" id="pane-text" role="tabpanel">
          <pre id="text-content" class="code-pane"></pre>
        </div>
        <div class="tab-pane" id="pane-source" role="tabpanel">
          <pre id="source-content" class="code-pane"></pre>
        </div>
      </div>

    </div>
  </main>

</div>

<div id="toast" role="status" aria-live="polite">
  <span class="toast-dot" aria-hidden="true"></span>
  <span id="toast-msg"></span>
</div>

<script>

// ─── Translations ───────────────────────────────────────────────
const TRANSLATIONS = {
  en: {
    search_placeholder:  'Filter messages…',
    empty_list_title:    'No messages yet',
    empty_state_title:   'Select a message to read it',
    empty_state_sub:     'Send to {smtp} and messages\nappear here in real time.',
    clear_all:           'Clear all',
    source:              'Source',
    delete:              'Delete',
    inbox:               'Inbox',
    tab_html:            'HTML',
    tab_text:            'Plain text',
    tab_source:          'Raw source',
    count_zero:          'No messages',
    count_one:           '1 message',
    count_many:          '{n} messages',
    meta_from:           'From',
    meta_to:             'To',
    meta_received:       'Received',
    meta_files:          'Files',
    no_text_body:        '(no plain-text body)',
    no_subject:          '(no subject)',
    no_sender:           '(no sender)',
    toast_new:           'New email received',
  },
  pt: {
    search_placeholder:  'Filtrar mensagens…',
    empty_list_title:    'Sem mensagens',
    empty_state_title:   'Selecione uma mensagem para ler',
    empty_state_sub:     'Envie para {smtp} e as mensagens\naparecem aqui em tempo real.',
    clear_all:           'Limpar tudo',
    source:              'Fonte',
    delete:              'Excluir',
    inbox:               'Caixa de entrada',
    tab_html:            'HTML',
    tab_text:            'Texto simples',
    tab_source:          'Fonte bruta',
    count_zero:          'Sem mensagens',
    count_one:           '1 mensagem',
    count_many:          '{n} mensagens',
    meta_from:           'De',
    meta_to:             'Para',
    meta_received:       'Recebido',
    meta_files:          'Arquivos',
    no_text_body:        '(sem corpo em texto simples)',
    no_subject:          '(sem assunto)',
    no_sender:           '(sem remetente)',
    toast_new:           'Novo e-mail recebido',
  },
  es: {
    search_placeholder:  'Filtrar mensajes…',
    empty_list_title:    'Sin mensajes',
    empty_state_title:   'Selecciona un mensaje para leerlo',
    empty_state_sub:     'Env\xeda a {smtp} y los mensajes\naparecen aqu\xed en tiempo real.',
    clear_all:           'Borrar todo',
    source:              'Fuente',
    delete:              'Eliminar',
    inbox:               'Bandeja de entrada',
    tab_html:            'HTML',
    tab_text:            'Texto plano',
    tab_source:          'Fuente sin procesar',
    count_zero:          'Sin mensajes',
    count_one:           '1 mensaje',
    count_many:          '{n} mensajes',
    meta_from:           'De',
    meta_to:             'Para',
    meta_received:       'Recibido',
    meta_files:          'Archivos',
    no_text_body:        '(sin cuerpo en texto plano)',
    no_subject:          '(sin asunto)',
    no_sender:           '(sin remitente)',
    toast_new:           'Nuevo correo recibido',
  },
  fr: {
    search_placeholder:  'Filtrer les messages…',
    empty_list_title:    'Aucun message',
    empty_state_title:   'S\xe9lectionnez un message pour le lire',
    empty_state_sub:     'Envoyez \xe0 {smtp} et les messages\napparaissent ici en temps r\xe9el.',
    clear_all:           'Tout effacer',
    source:              'Source',
    delete:              'Supprimer',
    inbox:               'Bo\xeete de r\xe9ception',
    tab_html:            'HTML',
    tab_text:            'Texte brut',
    tab_source:          'Source brute',
    count_zero:          'Aucun message',
    count_one:           '1 message',
    count_many:          '{n} messages',
    meta_from:           'De',
    meta_to:             '\xc0',
    meta_received:       'Re\xe7u',
    meta_files:          'Fichiers',
    no_text_body:        '(pas de corps en texte brut)',
    no_subject:          '(sans objet)',
    no_sender:           '(sans exp\xe9diteur)',
    toast_new:           'Nouveau courriel re\xe7u',
  },
};

// ─── Language state ─────────────────────────────────────────────
const SUPPORTED = ['en', 'pt', 'es', 'fr'];

function detectLang() {
  const saved = localStorage.getItem('localmail_lang');
  if (saved && SUPPORTED.includes(saved)) return saved;
  const browser = (navigator.language || 'en').toLowerCase().split('-')[0];
  return SUPPORTED.includes(browser) ? browser : 'en';
}

let lang = detectLang();

function t(key, vars) {
  let str = (TRANSLATIONS[lang] || TRANSLATIONS.en)[key] || key;
  if (vars) Object.entries(vars).forEach(([k, v]) => { str = str.replaceAll(`{${k}}`, v); });
  return str;
}

function applyTranslations() {
  // Static data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  // Search placeholder
  document.getElementById('search').placeholder = t('search_placeholder');
  document.getElementById('search').setAttribute('aria-label', t('search_placeholder'));

  // Empty state sub — has smtp-code span inside
  const smtpSpan = `<span class="smtp-code">smtp://localhost:1025</span>`;
  const subLines = t('empty_state_sub', { smtp: '\x00' }).split('\n');
  document.getElementById('empty-state-sub').innerHTML =
    subLines.map((line, i) => line.replace('\x00', smtpSpan) + (i < subLines.length - 1 ? '<br>' : '')).join('');

  // Lang button active state
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // Re-render count (uses translated strings)
  updateCount();
}

// ─── State ─────────────────────────────────────────────────────
let emails = [];
let selectedId = null;
const readIds = new Set();

// ─── Utilities ─────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function fmtTimeFull(iso) {
  return new Date(iso).toLocaleString([], {
    weekday: 'short', year: 'numeric', month: 'short',
    day: 'numeric', hour: '2-digit', minute: '2-digit',
  });
}

// ─── Count ─────────────────────────────────────────────────────
function updateCount() {
  const n = emails.length;
  document.getElementById('count-badge').textContent =
    n === 0 ? t('count_zero') : n === 1 ? t('count_one') : t('count_many', { n });
}

// ─── Render list ───────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('email-list');
  const emptyEl = document.getElementById('empty-list');

  const filtered = q
    ? emails.filter(e =>
        (e.from ?? '').toLowerCase().includes(q) ||
        (e.subject ?? '').toLowerCase().includes(q) ||
        (e.to ?? []).join(' ').toLowerCase().includes(q))
    : emails;

  if (!filtered.length) {
    list.innerHTML = '';
    list.appendChild(emptyEl);
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  list.innerHTML = filtered.map(e => {
    const unread = !readIds.has(e.id);
    const active = e.id === selectedId;
    return `
      <div class="email-item${active ? ' active' : ''}${unread ? ' unread' : ''}"
           data-id="${esc(e.id)}" role="listitem" tabindex="0" aria-selected="${active}">
        <div class="item-row-1">
          <span class="item-dot" aria-hidden="true"></span>
          <span class="item-from">${esc(e.from ?? t('no_sender'))}</span>
          <span class="item-time">${fmtTime(e.date)}</span>
        </div>
        <div class="item-subject">${esc(e.subject ?? t('no_subject'))}</div>
        <div class="item-preview">${esc((e.preview ?? '').slice(0, 120))}</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.email-item').forEach(el => {
    el.addEventListener('click', () => selectEmail(el.dataset.id));
    el.addEventListener('keydown', ev => {
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); selectEmail(el.dataset.id); }
    });
  });
}

// ─── Fetch list ────────────────────────────────────────────────
async function fetchEmails() {
  try {
    const res = await fetch('/api/messages');
    if (!res.ok) return;
    emails = await res.json();
    updateCount();
    renderList();
  } catch {}
}

// ─── Select email ──────────────────────────────────────────────
async function selectEmail(id) {
  selectedId = id;
  readIds.add(id);
  renderList();
  document.getElementById('detail-panel').classList.add('open');
  try {
    const res = await fetch(`/api/messages/${id}`);
    if (!res.ok) return;
    showDetail(await res.json());
  } catch {}
}

// ─── Show detail ───────────────────────────────────────────────
function showDetail(email) {
  document.getElementById('empty-state').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.style.display = 'flex';
  void dv.offsetWidth;

  document.getElementById('detail-subject').textContent =
    email.subject ?? t('no_subject');

  const rows = [
    [t('meta_from'),     email.from ?? '—'],
    [t('meta_to'),       (email.to ?? []).join(', ') || '—'],
    [t('meta_received'), fmtTimeFull(email.date)],
  ];
  if (email.attachments?.length) {
    rows.push([t('meta_files'), email.attachments
      .map(a => `${a.filename} (${(a.size / 1024).toFixed(1)} KB)`).join(', ')]);
  }
  document.getElementById('detail-meta').innerHTML = rows
    .map(([l, v]) =>
      `<dt class="meta-label">${esc(l)}</dt><dd class="meta-value">${esc(v)}</dd>`)
    .join('');

  const frame = document.getElementById('html-frame');
  frame.srcdoc = email.html
    ? email.html
    : `<pre style="font-family:system-ui;font-size:13px;padding:20px;white-space:pre-wrap;color:#333">${esc(email.text ?? '')}</pre>`;

  document.getElementById('text-content').textContent =
    email.text ?? t('no_text_body');
  document.getElementById('source-content').textContent = email.raw ?? '';

  activateTab('html');

  document.getElementById('delete-btn').onclick = async () => {
    await fetch(`/api/messages/${email.id}`, { method: 'DELETE' });
    emails = emails.filter(e => e.id !== email.id);
    readIds.delete(email.id);
    selectedId = null;
    updateCount();
    renderList();
    clearDetail();
  };

  document.getElementById('view-source-btn').onclick = () => activateTab('source');
}

// ─── Clear detail ──────────────────────────────────────────────
function clearDetail() {
  document.getElementById('empty-state').style.display = '';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('detail-panel').classList.remove('open');
}

// ─── Tabs ──────────────────────────────────────────────────────
function activateTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('active', p.id === `pane-${name}`));
}
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => activateTab(tab.dataset.tab));
});

// ─── Clear all ─────────────────────────────────────────────────
document.getElementById('clear-all-btn').addEventListener('click', async () => {
  if (!emails.length) return;
  await fetch('/api/messages', { method: 'DELETE' });
  emails = [];
  selectedId = null;
  readIds.clear();
  updateCount();
  renderList();
  clearDetail();
});

// ─── Search ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderList);

// ─── Back (mobile) ─────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  selectedId = null;
  clearDetail();
  renderList();
});

// ─── Language switcher ──────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    lang = btn.dataset.lang;
    localStorage.setItem('localmail_lang', lang);
    document.documentElement.lang = lang;
    applyTranslations();
    renderList();
    // Re-render open email meta if visible
    if (selectedId && document.getElementById('detail-view').style.display !== 'none') {
      fetch(`/api/messages/${selectedId}`)
        .then(r => r.ok ? r.json() : null)
        .then(email => { if (email) showDetail(email); })
        .catch(() => {});
    }
  });
});

// ─── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  document.getElementById('toast-msg').textContent = msg;
  const el = document.getElementById('toast');
  el.classList.add('show');
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ─── SSE ───────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = async ev => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'email:added') {
        await fetchEmails();
        showToast(t('toast_new'));
      }
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

// ─── Theme ─────────────────────────────────────────────────────
function getTheme() {
  const saved = localStorage.getItem('localmail_theme');
  if (saved === 'light' || saved === 'dark') return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('localmail_theme', theme);
}

document.getElementById('theme-btn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

// ─── Init ──────────────────────────────────────────────────────
applyTheme(getTheme());
document.documentElement.lang = lang;
applyTranslations();
fetchEmails();
connectSSE();

</script>
